name: Skill Scanner

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/SKILL.md"
      - "README.md"
      - ".github/workflows/skill-scanner.yml"
      - ".gitignore"
      - ".scripts/run-skill-scanner.sh"
      - ".scripts/process-skill-scanner-sarif.py"
      - ".skill-scanner-allowlist.json"
  push:
    branches:
      - main
    paths:
      - "**/SKILL.md"
      - "README.md"
      - ".github/workflows/skill-scanner.yml"
      - ".gitignore"
      - ".scripts/run-skill-scanner.sh"
      - ".scripts/process-skill-scanner-sarif.py"
      - ".skill-scanner-allowlist.json"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill scanner
        id: scan
        continue-on-error: true
        run: |
          chmod +x ./.scripts/run-skill-scanner.sh
          set +e
          ./.scripts/run-skill-scanner.sh \
            --format sarif \
            --output .reports/skill-scanner/results.sarif \
            --fail-on-severity high
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Process scanner results
        id: process_scan
        if: ${{ always() && hashFiles('.reports/skill-scanner/results.sarif') != '' }}
        run: |
          python ./.scripts/process-skill-scanner-sarif.py \
            --input .reports/skill-scanner/results.sarif \
            --allowlist .skill-scanner-allowlist.json \
            --summary .reports/skill-scanner/summary.md \
            --status .reports/skill-scanner/status.json \
            --blocking-sarif .reports/skill-scanner/blocking-results.sarif
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          status = json.loads(Path(".reports/skill-scanner/status.json").read_text())
          print(f"blocking_count={status['blocking_count']}")
          print(f"allowlisted_count={status['allowlisted_count']}")
          PY
          tee -a "$GITHUB_STEP_SUMMARY" < .reports/skill-scanner/summary.md

      - name: Upload SARIF to GitHub Code Scanning
        if: ${{ always() && hashFiles('.reports/skill-scanner/blocking-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .reports/skill-scanner/blocking-results.sarif

      - name: Upload scanner artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: skill-scanner-results
          path: .reports/skill-scanner/
          if-no-files-found: ignore

      - name: Fail workflow on scanner findings
        if: ${{ always() }}
        run: |
          scan_exit='${{ steps.scan.outputs.exit_code }}'
          if [[ -f .reports/skill-scanner/status.json ]]; then
            blocking_count=$(python - <<'PY'
          import json
          from pathlib import Path

          status = json.loads(Path(".reports/skill-scanner/status.json").read_text())
          print(status["blocking_count"])
          PY
            )
          else
            blocking_count=""
          fi

          if [[ -n "$blocking_count" && "$blocking_count" != "0" ]]; then
            echo "skill-scanner found $blocking_count blocking finding(s)." >&2
            echo "----- skill-scanner summary -----" >&2
            cat .reports/skill-scanner/summary.md >&2
            echo "----- end skill-scanner summary -----" >&2
            exit 1
          fi

          if [[ "$scan_exit" != "0" && -z "$blocking_count" ]]; then
            echo "skill-scanner exited with code $scan_exit before a processed report was generated." >&2
            echo "Review the skill-scanner-results artifact for details." >&2
            exit 1
          fi

          if [[ "$scan_exit" != "0" ]]; then
            echo "skill-scanner exited with code $scan_exit, but all current findings matched the allowlist." >&2
          fi
