name: Skill Scanner

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/SKILL.md"
      - "README.md"
      - ".github/workflows/skill-scanner.yml"
      - ".gitignore"
      - ".scripts/run-skill-scanner.sh"
      - ".scripts/process-skill-scanner-sarif.py"
  push:
    branches:
      - main
    paths:
      - "**/SKILL.md"
      - "README.md"
      - ".github/workflows/skill-scanner.yml"
      - ".gitignore"
      - ".scripts/run-skill-scanner.sh"
      - ".scripts/process-skill-scanner-sarif.py"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine scan scope
        id: scope
        run: |
          mkdir -p .reports/skill-scanner/scan-root

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "scan=true" >> "$GITHUB_OUTPUT"
            echo "enforce_fail=false" >> "$GITHUB_OUTPUT"
            echo "target=$PWD" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha='${{ github.event.pull_request.base.sha }}'
          else
            base_sha='${{ github.event.before }}'
          fi

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]] || ! git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            mapfile -t changed_files < <(git ls-files)
          else
            mapfile -t changed_files < <(git diff --name-only "$base_sha" "$GITHUB_SHA")
          fi
          declare -A skill_dirs=()

          for path in "${changed_files[@]}"; do
            [[ -z "$path" ]] && continue
            top="${path%%/*}"
            if [[ -d "$top" && -f "$top/SKILL.md" ]]; then
              skill_dirs["$top"]=1
            fi
          done

          if [[ "${#skill_dirs[@]}" -eq 0 ]]; then
            echo "scan=false" >> "$GITHUB_OUTPUT"
            echo "enforce_fail=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for dir in "${!skill_dirs[@]}"; do
            cp -R "$dir" ".reports/skill-scanner/scan-root/$dir"
          done

          echo "scan=true" >> "$GITHUB_OUTPUT"
          echo "enforce_fail=true" >> "$GITHUB_OUTPUT"
          echo "target=$PWD/.reports/skill-scanner/scan-root" >> "$GITHUB_OUTPUT"

      - name: No changed skills to scan
        if: ${{ steps.scope.outputs.scan != 'true' }}
        run: |
          echo "No changed skill directories detected; skipping skill-scanner."

      - name: Run skill scanner
        id: scan
        if: ${{ steps.scope.outputs.scan == 'true' }}
        continue-on-error: true
        run: |
          chmod +x ./.scripts/run-skill-scanner.sh
          set +e
          if [[ "${{ steps.scope.outputs.enforce_fail }}" == "true" ]]; then
            extra_flags=(--fail-on-severity high)
          else
            extra_flags=()
          fi
          SKILL_SCANNER_TARGET='${{ steps.scope.outputs.target }}' \
            ./.scripts/run-skill-scanner.sh \
            --format sarif \
            --output .reports/skill-scanner/results.sarif \
            "${extra_flags[@]}"
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Process scanner results
        id: process_scan
        if: ${{ steps.scope.outputs.scan == 'true' && always() && hashFiles('.reports/skill-scanner/results.sarif') != '' }}
        run: |
          python ./.scripts/process-skill-scanner-sarif.py \
            --input .reports/skill-scanner/results.sarif \
            --summary .reports/skill-scanner/summary.md \
            --status .reports/skill-scanner/status.json \
            --blocking-sarif .reports/skill-scanner/blocking-results.sarif
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          status = json.loads(Path(".reports/skill-scanner/status.json").read_text())
          print(f"blocking_count={status['blocking_count']}")
          print(f"blocking_error_count={status['blocking_error_count']}")
          PY
          tee -a "$GITHUB_STEP_SUMMARY" < .reports/skill-scanner/summary.md

      - name: Upload SARIF to GitHub Code Scanning
        if: ${{ steps.scope.outputs.scan == 'true' && always() && hashFiles('.reports/skill-scanner/blocking-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .reports/skill-scanner/blocking-results.sarif

      - name: Upload scanner artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: skill-scanner-results
          path: .reports/skill-scanner/
          if-no-files-found: ignore

      - name: Fail workflow on scanner findings
        if: ${{ steps.scope.outputs.enforce_fail == 'true' && always() }}
        run: |
          scan_exit='${{ steps.scan.outputs.exit_code }}'
          if [[ -f .reports/skill-scanner/status.json ]]; then
            blocking_count=$(python - <<'PY'
          import json
          from pathlib import Path

          status = json.loads(Path(".reports/skill-scanner/status.json").read_text())
          print(status["blocking_count"])
          PY
            )
            blocking_error_count=$(python - <<'PY'
          import json
          from pathlib import Path

          status = json.loads(Path(".reports/skill-scanner/status.json").read_text())
          print(status["blocking_error_count"])
          PY
            )
          else
            blocking_count=""
            blocking_error_count=""
          fi

          if [[ -n "$blocking_error_count" && "$blocking_error_count" != "0" ]]; then
            echo "skill-scanner found $blocking_error_count blocking error finding(s)." >&2
            echo "----- skill-scanner summary -----" >&2
            cat .reports/skill-scanner/summary.md >&2
            echo "----- end skill-scanner summary -----" >&2
            exit 1
          fi

          if [[ "$scan_exit" != "0" && -z "$blocking_count" ]]; then
            echo "skill-scanner exited with code $scan_exit before a processed report was generated." >&2
            echo "Review the skill-scanner-results artifact for details." >&2
            exit 1
          fi

          if [[ "$scan_exit" != "0" ]]; then
            echo "skill-scanner exited with code $scan_exit, but no changed-skill error-level findings remain." >&2
            if [[ -n "$blocking_count" && "$blocking_count" != "0" ]]; then
              echo "Non-blocking warnings/notes remain; see the uploaded summary artifact for details." >&2
            fi
          fi
